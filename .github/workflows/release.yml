name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build extension
        run: pnpm build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../chrome-extension-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Create CRX file
        id: create_crx
        run: |
          if [ -n "${{ secrets.CRX_PRIVATE_KEY }}" ]; then
            npm install -g crx3
            echo "${{ secrets.CRX_PRIVATE_KEY }}" > private_key.pem
            crx3 dist -o chrome-extension-${{ steps.get_version.outputs.VERSION }}.crx --privateKey private_key.pem
            rm -f private_key.pem
            echo "has_crx=true" >> $GITHUB_OUTPUT
          else
            echo "has_crx=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            chrome-extension-${{ steps.get_version.outputs.VERSION }}.zip
            chrome-extension-${{ steps.get_version.outputs.VERSION }}.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
